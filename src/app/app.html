<main class="game-page">
  <section class="game" aria-labelledby="game-title">
    <header class="game__header">
      <h1 id="game-title">Mon or Mon</h1>
      <p>Is it a Pokémon or a Digimon?</p>
    </header>

    <div class="creature-card">
      <div class="creature-card__image" role="img" aria-label="Creature image placeholder"></div>
    </div>

    <div class="game__choices" aria-label="Creature type choices">
      <button type="button">Pokémon</button>
      <button type="button">Digimon</button>
    </div>

    <p class="game__streak">Streak: 0</p>
  </section>
</main>
