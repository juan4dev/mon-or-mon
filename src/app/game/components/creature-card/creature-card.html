<div
  class="creature-card"
  [attr.aria-busy]="isLoading()"
  [class.creature-card--correct]="isCorrect()"
  [class.creature-card--incorrect]="isIncorrect()"
>
  <div class="creature-card__stage">
    @if (!started()) {
      <div class="creature-card__status creature-card__status--idle" aria-hidden="true">
        <span class="creature-card__status-symbol">?</span>
      </div>
    } @else if (unavailable()) {
      <div class="creature-card__status creature-card__status--error" aria-hidden="true">
        <span class="creature-card__status-symbol">!</span>
      </div>
    } @else if (creature(); as creature) {
      <app-creature-image
        [creature]="creature"
        [imageReady]="imageReady()"
        [effect]="roundEffect()"
        [effectPhase]="effectPhase()"
        [bossRound]="bossRound()"
        (imageLoaded)="imageLoaded.emit()"
        (imageFailed)="imageFailed.emit()"
      />
    } @else {
      <div class="creature-card__status" aria-hidden="true">
        <span>Loading...</span>
      </div>
    }

    @if (stageAction(); as action) {
      <div class="creature-card__overlay">
        <button type="button" (click)="actionRequested.emit(action.type)">
          {{ action.label }}
        </button>
      </div>
    }
  </div>

  <app-game-feedback
    [started]="started()"
    [creature]="creature()"
    [unavailable]="unavailable()"
    [loading]="loading()"
    [selectedUniverse]="selectedUniverse()"
    [timedOut]="timedOut()"
    [lostStreak]="lostStreak()"
    [roundEffect]="roundEffect()"
    [effectPhase]="effectPhase()"
  />

  <div class="creature-card__timer-slot">
    @if (resultAction(); as action) {
      <button
        class="creature-card__result-action"
        type="button"
        (click)="actionRequested.emit(action.type)"
      >
        {{ action.label }}
      </button>
    } @else if (started() && imageReady()) {
      <app-round-timer [seconds]="seconds()" [duration]="duration()" [percentage]="percentage()" />
    }
  </div>
</div>
