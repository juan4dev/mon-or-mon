<p
  class="streak"
  [class.streak--active]="streak() > 0"
  [class.streak--maximum]="streak() >= maximumDifficultyStreak"
  [class.streak--lost]="lost()"
  [style.--streak-hue]="streakHue()"
  aria-live="polite"
>
  <span>Streak</span>
  <strong class="streak__value" [class.streak__value--updated]="updated()">{{ streak() }}</strong>
</p>
