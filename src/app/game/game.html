<main class="game-page">
  <section class="game" aria-labelledby="game-title">
    @let creatureState = creatureState$ | async;
    @let creature = creatureState?.creature;
    @let creatureUnavailable = creatureState?.status === 'error' || imageFailed();
    @let creatureLoading = creatureState?.status !== 'ready' || !imageReady();

    <header class="game__header">
      <h1 id="game-title">Mon or Mon</h1>
      <p class="game__question">Is it a Pokémon or a Digimon?</p>
      <app-streak-display
        [streak]="streak()"
        [lost]="
          timedOut() || (selectedUniverse() !== null && selectedUniverse() !== creature?.universe)
        "
        [updated]="selectedUniverse() !== null && selectedUniverse() === creature?.universe"
      />
    </header>

    <app-creature-card
      [creature]="creature ?? null"
      [imageReady]="imageReady()"
      [unavailable]="creatureUnavailable"
      [selectedUniverse]="selectedUniverse()"
      [timedOut]="timedOut()"
      [seconds]="timeRemainingSeconds()"
      [percentage]="timeRemainingPercentage()"
      (imageLoaded)="handleImageLoad()"
      (imageFailed)="handleImageError()"
    />

    <app-answer-choices
      [creatureUniverse]="creature?.universe ?? null"
      [selectedUniverse]="selectedUniverse()"
      [enabled]="creatureState?.status === 'ready' && imageReady()"
      [timedOut]="timedOut()"
      (answered)="answer($event, creature)"
    />

    <app-game-feedback
      [creature]="creature ?? null"
      [unavailable]="creatureUnavailable"
      [loading]="creatureLoading"
      [selectedUniverse]="selectedUniverse()"
      [timedOut]="timedOut()"
      [lostStreak]="lostStreak()"
      (retryRequested)="retryCreature()"
      (nextRequested)="nextCreature()"
      (restartRequested)="restartGame()"
    />
  </section>
</main>
